<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>货运记账本</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"PingFang SC","Microsoft YaHei",sans-serif;background:#f5f0e8;color:#3d3226;min-height:100vh;-webkit-tap-highlight-color:transparent}

.header{background:linear-gradient(135deg,#e8783b,#c4561a);color:#fff;padding:14px 18px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.header h1{font-size:22px;font-weight:600;letter-spacing:2px}
.header .sub{font-size:13px;opacity:.85;margin-top:2px}

.tabs{display:flex;background:#fff;border-bottom:1px solid #e0d5c5}
.tab{flex:1;text-align:center;padding:12px 0;font-size:15px;color:#8b7355;cursor:pointer;border-bottom:3px solid transparent;transition:all .2s}
.tab.active{color:#c4561a;border-bottom-color:#c4561a;font-weight:600}

.page{display:none;padding:14px}
.page.active{display:block}

.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}

.btn{display:inline-flex;align-items:center;justify-content:center;border:none;border-radius:10px;padding:12px 24px;font-size:17px;font-weight:600;cursor:pointer;transition:all .15s;min-height:48px}
.btn:active{transform:scale(.96)}
.btn-primary{background:#c4561a;color:#fff;width:100%}
.btn-outline{background:#fff;color:#c4561a;border:2px solid #c4561a}
.btn-danger{background:#e74c3c;color:#fff}
.btn-sm{padding:8px 14px;font-size:13px;min-height:36px;border-radius:8px}
.btn-voice{background:#4CAF50;color:#fff;width:100%;font-size:18px;padding:16px}
.btn-voice.recording{background:#f44336;animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}

.driver-chips{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:14px}
.driver-chip{padding:10px 18px;background:#faf8f5;border:2px solid #e0d5c5;border-radius:22px;font-size:16px;cursor:pointer;transition:all .15s;white-space:nowrap}
.driver-chip:active{transform:scale(.95)}
.driver-chip.selected{background:#c4561a;color:#fff;border-color:#c4561a}
.driver-chip-new{border-style:dashed;color:#8b7355}

.amount-area{margin-bottom:12px}
.amount-area label{display:block;font-size:14px;color:#8b7355;margin-bottom:4px;font-weight:500}
.amount-input-row{display:flex;align-items:center;gap:8px}
.amount-input-row input{flex:1;padding:14px;border:2px solid #e0d5c5;border-radius:10px;font-size:22px;font-weight:700;text-align:center;background:#faf8f5;color:#3d3226;outline:none}
.amount-input-row input:focus{border-color:#c4561a}

.trip-row{display:flex;align-items:center;gap:0;margin-bottom:12px}
.trip-row label{font-size:14px;color:#8b7355;font-weight:500;margin-right:10px}
.trip-btn{width:40px;height:40px;border-radius:50%;border:2px solid #c4561a;background:#fff;color:#c4561a;font-size:22px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center}
.trip-btn:active{background:#c4561a;color:#fff}
.trip-num{font-size:22px;font-weight:700;margin:0 14px;min-width:30px;text-align:center}

.input-group{margin-bottom:12px}
.input-group label{display:block;font-size:14px;color:#8b7355;margin-bottom:4px;font-weight:500}
.input-group input,.input-group select{width:100%;padding:12px 14px;border:2px solid #e0d5c5;border-radius:10px;font-size:17px;background:#faf8f5;color:#3d3226;outline:none;transition:border .2s}
.input-group input:focus{border-color:#c4561a}
.row{display:flex;gap:10px}
.row>*{flex:1}

.voice-text{background:#faf8f5;border:2px dashed #e0d5c5;border-radius:10px;padding:14px;font-size:17px;min-height:50px;color:#8b7355;text-align:center;margin:10px 0;word-break:break-all}
.voice-text.has-content{color:#3d3226;border-style:solid;border-color:#4CAF50}

.record-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid #f0ebe0}
.record-item:last-child{border-bottom:none}
.record-info{flex:1}
.record-name{font-size:17px;font-weight:600}
.record-detail{font-size:13px;color:#8b7355;margin-top:2px}
.record-amount{font-size:18px;font-weight:700;color:#c4561a;text-align:right}
.record-del{padding:6px 10px;color:#ccc;cursor:pointer;font-size:18px}

.summary-block{margin-bottom:14px}
.summary-block h3{font-size:16px;color:#c4561a;margin-bottom:8px;border-bottom:2px solid #f0ebe0;padding-bottom:6px}
.summary-row{display:flex;justify-content:space-between;padding:8px 0;font-size:15px;border-bottom:1px solid #faf8f5}
.summary-row.total{font-size:18px;font-weight:700;color:#c4561a;border-top:2px solid #c4561a;border-bottom:none;padding-top:10px;margin-top:6px}

.export-hint{text-align:center;color:#8b7355;font-size:13px;margin-top:8px}

.empty{text-align:center;color:#bbb;padding:40px 0;font-size:15px}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.8);color:#fff;padding:10px 24px;border-radius:20px;font-size:14px;z-index:999;animation:fadeIn .3s}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}

.filter-bar{display:flex;gap:8px;margin-bottom:12px}
.filter-bar select,.filter-bar input{flex:1;padding:10px;border:2px solid #e0d5c5;border-radius:8px;font-size:14px;background:#fff}
</style>
</head>
<body>

<div class="header">
  <h1>货运记账本</h1>
  <div class="sub" id="totalEarnings">本月合计：¥0</div>
</div>

<div class="tabs">
  <div class="tab active" onclick="switchTab('add')">📝 记账</div>
  <div class="tab" onclick="switchTab('list')">📋 记录</div>
  <div class="tab" onclick="switchTab('summary')">📊 汇总</div>
</div>

<!-- 记账页 -->
<div class="page active" id="page-add">
  <div class="card" style="background:#fff9f0;border:2px solid #f0c080">
    <div style="font-size:14px;color:#c4561a;font-weight:600;margin-bottom:8px">🎤 语音记账 — 点下方输入框，用键盘上的麦克风说话</div>
    <input type="text" id="voiceInput" placeholder="点这里→按键盘🎤→说话，如：22355 电厂三期 2车单价100元"
      style="width:100%;padding:14px;border:2px solid #c4561a;border-radius:10px;font-size:17px;text-align:center;background:#fff;color:#3d3226;outline:none"
      autocomplete="off">
    <div style="text-align:center;margin-top:8px;font-size:13px;color:#8b7355" id="parseHint"></div>
  </div>

  <div class="card">
    <div style="font-size:16px;font-weight:600;margin-bottom:10px;color:#3d3226">✍️ 手动填写确认</div>

    <label style="font-size:14px;color:#8b7355;font-weight:500">车牌号</label>
    <div class="driver-chips" id="plateChips"></div>
    <input type="text" id="plateInput" placeholder="输入车牌号" style="width:100%;padding:10px;border:2px solid #e0d5c5;border-radius:10px;font-size:16px;margin-bottom:12px;background:#faf8f5;outline:none">

    <label style="font-size:14px;color:#8b7355;font-weight:500">拉货地点</label>
    <div class="driver-chips" id="locationChips"></div>
    <div style="display:flex;gap:8px;margin-bottom:12px">
      <input type="text" id="locationInput" placeholder="新地点名称" style="flex:1;padding:10px;border:2px solid #e0d5c5;border-radius:10px;font-size:15px;background:#faf8f5;outline:none">
      <input type="number" id="unitPriceInput" placeholder="单价(元)" style="width:90px;padding:10px;border:2px solid #e0d5c5;border-radius:10px;font-size:15px;background:#faf8f5;outline:none" inputmode="numeric">
      <button class="btn btn-sm btn-outline" onclick="addLocation()" style="white-space:nowrap">保存地点</button>
    </div>

    <div class="trip-row" style="justify-content:center">
      <label style="margin-right:6px">车次：</label>
      <div class="trip-btn" onclick="changeTrips(-1)">−</div>
      <div class="trip-num" id="tripDisplay">1</div>
      <div class="trip-btn" onclick="changeTrips(1)">+</div>
    </div>
    <div style="text-align:center;font-size:30px;font-weight:700;color:#c4561a;margin:8px 0" id="amountDisplay">¥0</div>

    <div class="input-group">
      <label>日期</label>
      <input type="date" id="recordDate">
    </div>
    <button class="btn btn-primary" onclick="addRecord()">✅ 记一笔</button>
  </div>

  <div class="card" id="todayPreview" style="display:none"></div>
</div>

<!-- 记录页 -->
<div class="page" id="page-list">
  <div class="filter-bar">
    <select id="filterLocation" onchange="renderRecords()">
      <option value="">全部地点</option>
    </select>
    <input type="date" id="filterDate" onchange="renderRecords()">
    <button class="btn btn-sm btn-outline" onclick="clearFilter()">清除</button>
  </div>
  <div class="card" id="recordList">
    <div class="empty">暂无记录</div>
  </div>
  <button class="btn btn-outline" style="width:100%;margin-top:8px" onclick="exportCSV()">📥 导出为表格文件</button>
  <div class="export-hint">导出后用 Excel 或 WPS 打开</div>
</div>

<!-- 汇总页 -->
<div class="page" id="page-summary">
  <div class="card" id="summaryContent">
    <div class="empty">暂无数据</div>
  </div>
</div>

<script>
// ===== 数据管理 =====
const STORAGE_KEY = 'truck_bookkeeping_v2';
const PLATES_KEY = 'truck_plates';
const LOCATIONS_KEY = 'truck_locations';

function getRecords(){return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]')}
function saveRecords(r){localStorage.setItem(STORAGE_KEY,JSON.stringify(r))}
function getPlates(){return JSON.parse(localStorage.getItem(PLATES_KEY)||'[]')}
function savePlates(d){localStorage.setItem(PLATES_KEY,JSON.stringify(d))}
function getLocations(){return JSON.parse(localStorage.getItem(LOCATIONS_KEY)||'{}')}
function saveLocations(d){localStorage.setItem(LOCATIONS_KEY,JSON.stringify(d))}

// ===== 当前选中的状态 =====
let curPlate = '';
let curLocation = '';
let curUnitPrice = 0;
let curTrips = 1;

// ===== 初始化 =====
document.getElementById('recordDate').value = new Date().toISOString().split('T')[0];
switchTab('add');
updateTotalEarnings();
updatePlateChips();
updateLocationChips();
renderTodayPreview();

// ===== 标签切换 =====
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['add','list','summary'][i]===name)
  });
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  if(name==='list'){ renderRecords(); updateFilterLocations(); }
  if(name==='summary') renderSummary();
  updateTotalEarnings();
}

// ===== 车牌号快速选择 =====
function updatePlateChips(){
  const plates = getPlates();
  const container = document.getElementById('plateChips');
  if(plates.length===0){ container.innerHTML=''; return; }
  container.innerHTML = plates.map(p=>
    '<span class="driver-chip'+(p===curPlate?' selected':'')+'" onclick="selectPlate(\''+p.replace(/'/g,"\\'")+'\')">'+p+'</span>'
  ).join('');
}

function selectPlate(plate){
  curPlate = plate;
  document.getElementById('plateInput').value = plate;
  updatePlateChips();
}

// ===== 地点快速选择 =====
function updateLocationChips(){
  const locations = getLocations();
  const container = document.getElementById('locationChips');
  const names = Object.keys(locations);
  if(names.length===0){ container.innerHTML=''; return; }
  container.innerHTML = names.map(loc=>
    '<span class="driver-chip'+(loc===curLocation?' selected':'')+'" onclick="selectLocation(\''+loc.replace(/'/g,"\\'")+'\')">'+loc+' <small style="opacity:.7">¥'+locations[loc]+'</small></span>'
  ).join('');
}

function selectLocation(loc){
  curLocation = loc;
  curUnitPrice = getLocations()[loc]||0;
  document.getElementById('locationInput').value = '';
  document.getElementById('unitPriceInput').value = '';
  updateLocationChips();
  updateAmountDisplay();
}

function addLocation(){
  const name = document.getElementById('locationInput').value.trim();
  const price = parseFloat(document.getElementById('unitPriceInput').value);
  if(!name){showToast('请输入地点名称');return}
  if(!price||price<1){showToast('请输入有效的单价');return}
  const locations = getLocations();
  locations[name] = price;
  saveLocations(locations);
  curLocation = name;
  curUnitPrice = price;
  document.getElementById('locationInput').value = '';
  document.getElementById('unitPriceInput').value = '';
  updateLocationChips();
  updateAmountDisplay();
  showToast('已保存地点：'+name+' 单价¥'+price);
}

// ===== 车次调整 =====
function changeTrips(delta){
  curTrips = Math.max(1, curTrips + delta);
  document.getElementById('tripDisplay').textContent = curTrips;
  updateAmountDisplay();
}

function updateAmountDisplay(){
  const amount = curTrips * curUnitPrice;
  document.getElementById('amountDisplay').textContent = amount>0 ? '¥'+amount : '¥0';
}

// ===== 语音输入（通过输入法自带语音） =====
let parseTimer = null;
document.getElementById('voiceInput').addEventListener('input', function(){
  const text = this.value.trim();
  if(!text){ document.getElementById('parseHint').textContent = ''; return; }
  clearTimeout(parseTimer);
  parseTimer = setTimeout(()=>{ parseVoice(text); }, 600);
});

document.getElementById('plateInput').addEventListener('input', function(){
  curPlate = this.value.trim();
  updatePlateChips();
});

// 中文数字转换
const CN_NUM = {'零':0,'一':1,'二':2,'两':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10,'百':100,'千':1000,'万':10000};

function parseChineseNumber(s){
  s = s.replace(/块/g,'元').replace(/趟/g,'车').replace(/个/g,'');
  let num = '';
  for(let c of s){
    if(c>='0'&&c<='9') num+=c;
    else if(CN_NUM[c]!==undefined) num+=CN_NUM[c];
  }
  return parseInt(num)||0;
}

function parseVoice(rawText){
  const original = rawText;
  // 去空格和标点，但保留原始文本用于调试
  let text = rawText.replace(/[，。！？、\s]+/g,'').trim();
  if(!text) return;
  const locations = getLocations();
  const locNames = Object.keys(locations);

  // ===== 1. 提取车牌 =====
  const provinceChars = '京津沪渝冀豫云辽黑湘皖鲁新苏浙赣鄂桂甘晋蒙陕吉闽贵粤川青藏琼宁港澳';
  let plate = '';
  // 先尝试完整车牌格式: 省份+字母+数字字母
  let plateMatch = text.match(new RegExp('^(['+provinceChars+'])[A-Za-z][A-Za-z0-9]{4,7}'));
  // 再尝试纯数字/字母车牌(4-8位)
  if(!plateMatch){
    plateMatch = text.match(/^([A-Za-z0-9]{4,8})/);
  }
  if(plateMatch){
    plate = plateMatch[0];
    text = text.replace(plate, '');
  }

  // ===== 2. 提取所有数字（只提取跟车/趟/元/单价相关的） =====
  const allNums = [];
  // 阿拉伯数字
  const digitMatches = [...text.matchAll(/\d+/g)];
  digitMatches.forEach(m => {
    allNums.push({value: parseInt(m[0]), pos: m.index, raw: m[0]});
  });
  // 中文数字 — 只提取后面跟着车/趟/元/块，或前面有"单价""拖"的
  const cnContextMatch = /(单价|拖)?([一二两三四五六七八九十百千]+)\s*([车趟元块]|$)/g;
  const cnMatches = [...text.matchAll(cnContextMatch)];
  cnMatches.forEach(m => {
    const v = parseChineseNumber(m[2]);
    if(v>0) allNums.push({value: v, pos: m.index + (m[1]||'').length, raw: m[2]});
  });
  allNums.sort((a,b)=>a.pos-b.pos);

  // ===== 3. 分类数字：车次 vs 单价 =====
  let trips = 0;
  let unitPrice = 0;

  // 检查是否有"单价"关键词
  const djIdx = text.indexOf('单价');
  // 检查每个数字后面是不是跟着"车"或"趟"
  for(let i=0; i<allNums.length; i++){
    const n = allNums[i];
    const after = text.substring(n.pos + n.raw.length, n.pos + n.raw.length + 3);
    if(/^[车趟]/.test(after)){
      // 这个数字是车次
      if(!trips || n.value < trips) trips = n.value;
      continue;
    }
    // 检查前面是否有"单价"
    if(djIdx>=0 && n.pos > djIdx){
      // 单价后面的数字
      if(!unitPrice) unitPrice = n.value;
      continue;
    }
    // 检查后面是否有"元"
    if(/^[元块]/.test(after)){
      // 可能是金额或单价
      if(!unitPrice) unitPrice = n.value;
      continue;
    }
    // 未分类的数字
    if(!trips && n.value<=50) trips = n.value;
    else if(!unitPrice) unitPrice = n.value;
  }

  // ===== 4. 修正不合理值 =====
  // 如果车次>50，可能识别错了，交换
  if(trips>50 && unitPrice && unitPrice<=50){
    const tmp = trips;
    trips = unitPrice;
    unitPrice = tmp;
  }
  // 默认值
  if(!trips) trips = 1;

  // ===== 5. 提取地点 =====
  let loc = '';
  // 先尝试匹配已知地点
  if(locNames.length>0){
    const sorted = [...locNames].sort((a,b)=>b.length-a.length);
    for(const name of sorted){
      if(text.includes(name)){ loc = name; break; }
    }
  }
  // 没有已知地点时，清理文本提取
  if(!loc){
    let remaining = text;
    // 去掉已识别的数字及其单位（阿拉伯+中文）
    remaining = remaining.replace(/\d+\s*[车趟元块]?/g,'');
    remaining = remaining.replace(/[一二两三四五六七八九十百千]+\s*[车趟元块]/g,'');
    remaining = remaining.replace(/单价\s*\d+/g,'');
    // 去掉关键词
    remaining = remaining.replace(/在|拖|拉|去|到|的|单价|元|块|车|趟/g,'');
    // 去掉句首句尾的语气词
    remaining = remaining.replace(/^[的了呢啊呀哦]+/g,'').replace(/[的了呢啊呀哦]+$/g,'').trim();
    if(remaining && remaining.length>=2 && remaining.length<=20){
      loc = remaining;
      document.getElementById('locationInput').value = loc;
    }
  }

  // ===== 6. 汇总结果 =====
  if(plate || loc || trips){
    if(plate){ selectPlate(plate); document.getElementById('plateInput').value = plate; }

    if(loc && locations[loc]){
      selectLocation(loc);
    } else if(loc && unitPrice){
      // 新地点+单价 → 自动保存
      locations[loc] = unitPrice;
      saveLocations(locations);
      curLocation = loc;
      curUnitPrice = unitPrice;
      document.getElementById('locationInput').value = '';
      document.getElementById('unitPriceInput').value = '';
      updateLocationChips();
      updateAmountDisplay();
    } else if(loc){
      curLocation = loc;
      curUnitPrice = unitPrice || curUnitPrice;
      updateLocationChips();
    }

    curTrips = trips;
    document.getElementById('tripDisplay').textContent = curTrips;
    updateAmountDisplay();

    const total = curTrips * curUnitPrice;
    const dbg = ' ['+original+']';
    document.getElementById('parseHint').innerHTML = '✅ <b>'+(plate||'未填')+'</b> '+loc+' '+curTrips+'车 × ¥'+curUnitPrice+' = ¥'+total+' — 核对后点"记一笔"<br><small style="color:#aaa">识别原文：'+original+'</small>';
    document.getElementById('parseHint').style.color = '#4CAF50';
  } else {
    document.getElementById('parseHint').innerHTML = '未能识别，请手动填写<br><small style="color:#aaa">识别原文：'+original+'</small>';
    document.getElementById('parseHint').style.color = '#e8783b';
  }
}

// ===== 添加记录 =====
function addRecord(){
  const plate = (curPlate || document.getElementById('plateInput').value).trim();
  const loc = curLocation;
  const trips = curTrips;
  const unitPrice = curUnitPrice;
  const amount = trips * unitPrice;
  const date = document.getElementById('recordDate').value;

  if(!plate){showToast('请输入车牌号');return}
  if(!loc){showToast('请选择或新增拉货地点');return}
  if(!unitPrice||unitPrice<1){showToast('请先设置地点的单价');return}
  if(!trips||trips<1){showToast('车次至少为1');return}

  const records = getRecords();
  records.push({
    id: Date.now(),
    plate: plate,
    location: loc,
    trips: trips,
    unitPrice: unitPrice,
    amount: amount,
    date: date,
    createdAt: new Date().toISOString()
  });
  saveRecords(records);

  // 保存车牌
  const plates = getPlates();
  if(!plates.includes(plate)){plates.push(plate);plates.sort();savePlates(plates)}

  // 完全清空，恢复初始状态
  document.getElementById('voiceInput').value = '';
  document.getElementById('parseHint').textContent = '';
  document.getElementById('plateInput').value = '';
  document.getElementById('locationInput').value = '';
  document.getElementById('unitPriceInput').value = '';
  curPlate = '';
  curLocation = '';
  curUnitPrice = 0;
  curTrips = 1;
  document.getElementById('tripDisplay').textContent = '1';
  document.getElementById('amountDisplay').textContent = '¥0';
  updatePlateChips();
  updateLocationChips();
  updateTotalEarnings();
  renderTodayPreview();
  // 显示"再来一车"快捷按钮
  const hint = document.getElementById('parseHint');
  hint.innerHTML = '✅ 已记录：'+plate+' '+loc+' '+trips+'车 ¥'+amount+' &nbsp; <button onclick="quickRepeat(\''+plate.replace(/'/g,"\\'")+'\',\''+loc.replace(/'/g,"\\'")+'\','+unitPrice+')" style="background:#c4561a;color:#fff;border:none;border-radius:14px;padding:4px 12px;font-size:13px;cursor:pointer">再来一车</button>';
  hint.style.color = '#4CAF50';
}

function quickRepeat(plate, loc, price){
  selectPlate(plate);
  document.getElementById('plateInput').value = plate;
  selectLocation(loc);
  curTrips = 1;
  document.getElementById('tripDisplay').textContent = '1';
  updateAmountDisplay();
  document.getElementById('parseHint').innerHTML = '✅ 已填入：<b>'+plate+'</b> '+loc+' 1车 ¥'+price+' — 可调整车次后点"记一笔"';
  document.getElementById('parseHint').style.color = '#4CAF50';
  window.scrollTo({top:0,behavior:'smooth'});
}

// ===== 今日记录预览 =====
function renderTodayPreview(){
  const today = new Date().toISOString().split('T')[0];
  const records = getRecords().filter(r=>r.date===today);
  const container = document.getElementById('todayPreview');
  if(!container) return;
  if(records.length===0){
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'block';
  records.sort((a,b)=>b.id-a.id);
  const total = records.reduce((s,r)=>s+r.amount,0);
  const totalTrips = records.reduce((s,r)=>s+r.trips,0);
  const latest = records.slice(0,3);
  container.innerHTML = '<div style="font-size:14px;font-weight:600;color:#8b7355;margin-bottom:6px">📋 今日已记 '+totalTrips+'车 ¥'+total+'</div>'
    + latest.map(r=>'<div style="font-size:13px;color:#8b7355;padding:3px 0;border-bottom:1px solid #f5f0e8">'+r.plate+' '+r.location+' '+r.trips+'车 ¥'+r.amount.toFixed(0)+'</div>').join('');
}

function deleteRecord(id){
  if(!confirm('确定删除这条记录吗？'))return;
  const records = getRecords().filter(r=>r.id!==id);
  saveRecords(records);
  renderRecords();
  updateTotalEarnings();
  renderTodayPreview();
  showToast('已删除');
}

// ===== 记录列表 =====
function updateFilterLocations(){
  const sel = document.getElementById('filterLocation');
  const locations = getLocations();
  const val = sel.value;
  sel.innerHTML = '<option value="">全部地点</option>'+Object.keys(locations).map(l=>'<option value="'+l+'">'+l+'</option>').join('');
  sel.value = val;
}

function renderRecords(){
  let records = getRecords();
  const filterLoc = document.getElementById('filterLocation').value;
  const filterDate = document.getElementById('filterDate').value;

  if(filterLoc) records = records.filter(r=>r.location===filterLoc);
  if(filterDate) records = records.filter(r=>r.date===filterDate);

  records.sort((a,b)=>b.date.localeCompare(a.date)||b.id-a.id);

  const container = document.getElementById('recordList');
  if(records.length===0){
    container.innerHTML = '<div class="empty">暂无记录</div>';
    return;
  }
  container.innerHTML = records.map(r=>`
    <div class="record-item">
      <div class="record-info">
        <div class="record-name">${r.plate} <span style="font-size:13px;color:#8b7355">${r.location}</span></div>
        <div class="record-detail">${r.date} · ${r.trips}车 × ¥${r.unitPrice} = ¥${r.amount.toFixed(0)}</div>
      </div>
      <div class="record-amount">¥${r.amount.toFixed(0)}</div>
      <div class="record-del" onclick="deleteRecord(${r.id})" title="删除">×</div>
    </div>
  `).join('');
}

function clearFilter(){
  document.getElementById('filterLocation').value='';
  document.getElementById('filterDate').value='';
  renderRecords();
}

// ===== 汇总 =====
function renderSummary(){
  const records = getRecords();
  const container = document.getElementById('summaryContent');
  if(records.length===0){
    container.innerHTML = '<div class="empty">暂无数据</div>';
    return;
  }

  // 按地点分组，每个地点内按车牌汇总
  const byLocation = {};
  records.forEach(r=>{
    if(!byLocation[r.location]) byLocation[r.location] = {trips:0,amount:0,plates:{}};
    byLocation[r.location].trips += r.trips;
    byLocation[r.location].amount += r.amount;
    if(!byLocation[r.location].plates[r.plate]) byLocation[r.location].plates[r.plate] = {trips:0,amount:0};
    byLocation[r.location].plates[r.plate].trips += r.trips;
    byLocation[r.location].plates[r.plate].amount += r.amount;
  });

  // 本月汇总
  const now = new Date();
  const thisMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const monthRecords = records.filter(r=>r.date.startsWith(thisMonth));
  const monthTotal = monthRecords.reduce((s,r)=>s+r.amount,0);
  const monthTrips = monthRecords.reduce((s,r)=>s+r.trips,0);

  let html = '';

  // 本月概览
  html += '<div class="summary-block"><h3>📅 本月概览（'+thisMonth+'）</h3>';
  html += '<div class="summary-row"><span>总车次</span><span>'+monthTrips+' 车</span></div>';
  html += '<div class="summary-row total"><span>本月合计</span><span>¥'+monthTotal.toFixed(0)+'</span></div>';
  html += '</div>';

  // 按地点汇总
  Object.entries(byLocation).sort((a,b)=>b[1].amount-a[1].amount).forEach(([loc,data])=>{
    const locs = getLocations();
    const price = locs[loc]||'?';
    html += '<div class="summary-block"><h3>📍 '+loc+'（单价¥'+price+'）</h3>';
    html += '<div class="summary-row"><span>总车次</span><span>'+data.trips+' 车</span></div>';
    html += '<div class="summary-row"><span>总金额</span><span>¥'+data.amount.toFixed(0)+'</span></div>';
    // 按车牌
    Object.entries(data.plates).sort((a,b)=>b[1].amount-a[1].amount).forEach(([plate,pd])=>{
      html += '<div class="summary-row" style="padding-left:12px;font-size:14px"><span>🚛 '+plate+'</span><span>'+pd.trips+'车 · ¥'+pd.amount.toFixed(0)+'</span></div>';
    });
    html += '</div>';
  });

  // 全部合计
  const allTotal = records.reduce((s,r)=>s+r.amount,0);
  const allTrips = records.reduce((s,r)=>s+r.trips,0);
  html += '<div class="summary-block"><h3>📊 全部合计</h3>';
  html += '<div class="summary-row total"><span>总计</span><span>'+allTrips+'车 · ¥'+allTotal.toFixed(0)+'</span></div>';
  html += '</div>';

  container.innerHTML = html;
}

function updateTotalEarnings(){
  const now = new Date();
  const thisMonth = now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
  const records = getRecords();
  const monthTotal = records.filter(r=>r.date.startsWith(thisMonth)).reduce((s,r)=>s+r.amount,0);
  document.getElementById('totalEarnings').textContent = '本月合计：¥'+monthTotal.toFixed(0);
}

// ===== 导出CSV =====
function exportCSV(){
  const records = getRecords();
  if(records.length===0){showToast('没有记录可导出');return}
  records.sort((a,b)=>a.date.localeCompare(b.date));
  let csv = '﻿日期,车牌号,地点,车次,单价(元),金额(元)\n';
  records.forEach(r=>{
    csv += r.date+','+r.plate+','+r.location+','+r.trips+','+r.unitPrice+','+r.amount+'\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = '货运记账_'+new Date().toISOString().split('T')[0]+'.csv';
  a.click();
  URL.revokeObjectURL(url);
  showToast('已下载，用Excel或WPS打开');
}

function showToast(msg){
  const existing = document.querySelector('.toast');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2000);
}
</script>
